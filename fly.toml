app = "testing-project"
primary_region = "gru"

[build]

[deploy]
  release_command = "node node_modules/.bin/prisma db push"

[env]
  PORT = "3000"
  DATABASE_URL = "file:/data/prod.db"

[[mounts]]
  source = "sqlite_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
